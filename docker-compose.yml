services:
  app:
    build: .
    environment:
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is not set}
      - DEFAULT_COOKIE_FILE_PATH=${DEFAULT_COOKIE_FILE_PATH:-}
      - DEFAULT_COOKIE_EXPECTED_COUNT=${DEFAULT_COOKIE_EXPECTED_COUNT:-4}
    ports:
      - "${XSERVICE_PORT:-8000}:8000"
    volumes:
      - ./src:/app/src
      - ./.secrets:/app/.secrets:ro
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=${POSTGRES_USER:?POSTGRES_USER is not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is not set}
      - POSTGRES_DB=${POSTGRES_DB:?POSTGRES_DB is not set}
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  postgres_data:
